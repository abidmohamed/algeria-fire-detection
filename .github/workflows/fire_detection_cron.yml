name: Algeria Forest Fire Detection Pipeline

on:
  schedule:
    # Run every 30 minutes (approx. 48 runs per day)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions dashboard

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  run-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Enable automatic caching for faster runs

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libproj-dev gdal-bin

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Test Suite
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres" # Dummy DB URL for tests
        run: |
          python -m pytest tests/

      - name: Execute Detection Pipeline
        env:
          # Bind GitHub Repository Secrets to script environment variables
          NASA_FIRMS_KEY: ${{ secrets.NASA_FIRMS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CDSE_USERNAME: ${{ secrets.CDSE_USERNAME }}
          CDSE_PASSWORD: ${{ secrets.CDSE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python pipeline.py
